<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroLens</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Image analysis workspace">
        <div class="upload-pane">
          <div class="title-row">
            <div>
              <p class="eyebrow">Gemini vision tool</p>
              <h1>NeuroLens</h1>
            </div>
            <span class="status-pill" id="statusPill">Ready</span>
          </div>

          <label class="drop-zone" id="dropZone">
            <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
            <span class="upload-icon" aria-hidden="true">+</span>
            <span class="drop-title">Upload an image</span>
            <span class="drop-copy">PNG, JPG, WEBP, or GIF</span>
          </label>

          <div class="preview-wrap" id="previewWrap" hidden>
            <img id="imagePreview" alt="Uploaded preview" />
          </div>

          <div class="controls">
            <button id="analyzeButton" type="button" disabled>Analyze Image</button>
          </div>
        </div>

        <div class="result-pane">
          <div class="result-header">
            <div>
              <p class="eyebrow">Final output</p>
              <h2>Input and Result</h2>
            </div>
            <button id="copyButton" type="button" disabled>Copy Result</button>
          </div>

          <article class="result-card" id="resultCard">
            <p class="empty-state">Upload an image to show input first and resulted output below it.</p>
          </article>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
